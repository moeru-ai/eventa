  '@electron-toolkit/preload': ^3.0.2
  '@moeru/std': 0.1.0-beta.18
  '@types/node': ^25.9.4
  '@types/picomatch': ^4.0.3
  '@vitest/browser-playwright': ^4.1.9
  '@vitest/coverage-v8': ^4.1.9
  '@vitest/web-worker': ^4.1.9
  bumpp: ^11.1.0
  crossws: ^0.4.7
  eslint: ^10.6.0
  hono: ^4.12.27
  nanoid: ^5.1.16
  picomatch: ^4.0.4
  playwright: ^1.61.1
  taze: ^19.14.1
  tsdown: ^0.22.3
  tsx: ^4.22.4
  typescript: ^6.0.3
  unplugin-unused: ^0.5.7
  vite: ^8.1.2
  vitest: ^4.1.9

catalogMode: prefer

