allowBuilds:
  electron: true
  esbuild: true

catalog:
  '@antfu/eslint-config': ^9.0.0
  '@electron-toolkit/preload': ^3.0.2
  '@moeru/std': 0.1.0-beta.18
  '@types/node': ^25.9.1
  '@vitest/browser-playwright': ^4.1.8
  '@vitest/coverage-v8': ^4.1.8
  '@vitest/web-worker': ^4.1.8
  bumpp: ^11.1.0
  crossws: ^0.4.5
  eslint: ^10.4.1
  hono: ^4.12.23
  nanoid: ^5.1.11
  picomatch: ^4.0.4
  playwright: ^1.60.0
  taze: ^19.14.1
  tsdown: ^0.22.1
  tsx: ^4.22.4
  typescript: ^6.0.3
  unplugin-unused: ^0.5.7
  vite: ^8.0.16
  vitest: ^4.1.8

catalogMode: prefer

cleanupUnusedCatalogs: true

onlyBuiltDependencies:
  - electron
  - esbuild

shellEmulator: true

trustPolicy: no-downgrade

trustPolicyExclude:
  - chokidar@4.0.3
  - semver@6.3.1
